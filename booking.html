<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyMaxTransfers | Book Your Luxury Transfer</title>
<meta name="description" content="Book your luxury airport transfer, private chauffeur, Cape Town tour, or cross-border minibus transfer with SkyMaxTransfers.">
<link rel="stylesheet" href="styles.css">
<style>
/* Booking Page Specific Styles */

.booking-hero{
  position: relative;
  height: 60vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background: url('mercedes-airport-transfer.jpg') no-repeat center center/cover;
  color: white;
}

.booking-hero::after{
  content:"";
  position:absolute;
  top:0; left:0; right:0; bottom:0;
  background: rgba(0,0,0,0.6);
}

.booking-hero .hero-text{
  position: relative;
  z-index: 2;
}

.booking-hero h1{
  font-size: 42px;
  color: #d4af37;
}

.booking-hero p{
  font-size: 18px;
}

.booking-form-section{
  padding: 60px 5%;
  background:#111;
}

.booking-form{
  max-width: 700px;
  margin:0 auto;
  display:flex;
  flex-direction:column;
  gap:20px;
}

.booking-form label{
  font-weight:bold;
  color:white;
  margin-bottom:5px;
}

.booking-form input, 
.booking-form select, 
.booking-form textarea{
  padding:12px 15px;
  border-radius:5px;
  border:none;
  font-size:16px;
  width:100%;
  background:#1a1a1a;
  color:white;
}

.booking-form textarea{
  resize: vertical;
  min-height:100px;
}

.booking-form .cta{
  background:#d4af37;
  color:black;
  padding:16px 30px;
  font-size:18px;
  font-weight:bold;
  border:none;
  border-radius:5px;
  cursor:pointer;
  transition:0.3s;
  text-align:center;
}

.booking-form .cta:hover{
  background:white;
}

/* MOBILE */
@media(max-width:768px){
  .booking-hero h1{
    font-size:32px;
  }
  .booking-hero p{
    font-size:16px;
  }
}
</style>
</head>
<body>

<header>
  <div class="logo">SKYMAX TRANSFERS</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="booking.html">Booking</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section class="booking-hero">
  <div class="hero-text">
    <h1>Book Your Luxury Transfer</h1>
    <p>Fill out the form below to secure your premium chauffeur service or airport transfer.</p>
  </div>
</section>

<!-- BOOKING FORM -->
<section class="booking-form-section">
  <form class="booking-form" action="#" method="POST">
    
    <label for="name">Full Name</label>
    <input type="text" id="name" name="name" placeholder="Your full name" required>
    
    <label for="email">Email Address</label>
    <input type="email" id="email" name="email" placeholder="you@example.com" required>
    
    <label for="phone">Phone Number</label>
    <input type="tel" id="phone" name="phone" placeholder="+27 123 456 789" required>
    
    <label for="pickup">Pickup Location</label>
    <input type="text" id="pickup" name="pickup" placeholder="Airport, hotel, or address" required>
    
    <label for="dropoff">Drop-off Location</label>
    <input type="text" id="dropoff" name="dropoff" placeholder="Airport, hotel, or address" required>
    
    <label for="datetime">Pickup Date & Time</label>
    <input type="datetime-local" id="datetime" name="datetime" required>
    
    <label for="vehicle">Select Vehicle / Service</label>
    <select id="vehicle" name="vehicle" required>
      <option value="">-- Choose Vehicle --</option>
      <option value="mercedes-v-class">Mercedes V-Class</option>
      <option value="mercedes-c-class">Mercedes C-Class</option>
      <option value="toyota-quantum">Toyota Quantum Minibus</option>
      <option value="funeral-vehicle">Funeral Transport</option>
      <option value="chauffeur-hire">Full-Day Chauffeur</option>
      <option value="cape-town-tour">Cape Town Tour</option>
    </select>

    <label for="notes">Additional Notes</label>
    <textarea id="notes" name="notes" placeholder="Any special requests or details"></textarea>

    <button type="submit" class="cta">Submit Booking</button>

  </form>
</section>

<footer>
  <p>© 2026 SKYMAX Transfers | Cape Town Luxury Chauffeur Services</p>
</footer>

</body>

</html>
